---
- name: Korplin Linux Developer Platform Bootstrap
  hosts: localhost
  connection: local
  become: yes
  gather_facts: yes

  vars:
    github_raw_base: "https://raw.githubusercontent.com/Korplin/LinuxDevPlatformBootstrap/main"

    target_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    target_home: "{{ getent_passwd[target_user][4] }}"

    debian_sources_list: "/etc/apt/sources.list"
    debian_deb822_sources: "/etc/apt/sources.list.d/debian.sources"

    brave_keyring_path: "/usr/share/keyrings/brave-browser-archive-keyring.gpg"
    brave_sources_path: "/etc/apt/sources.list.d/brave-browser-release.sources"

    microsoft_keyring_path: "/usr/share/keyrings/microsoft.gpg"
    vscode_sources_path: "/etc/apt/sources.list.d/vscode.sources"

    githubcli_keyring_path: "/usr/share/keyrings/githubcli-archive-keyring.gpg"
    githubcli_sources_path: "/etc/apt/sources.list.d/github-cli.list"

    kubernetes_keyring_path: "/etc/apt/keyrings/kubernetes-apt-keyring.gpg"
    kubernetes_sources_path: "/etc/apt/sources.list.d/kubernetes.list"
    kubernetes_minor_version: "v1.35"

    helm_keyring_path: "/usr/share/keyrings/helm.gpg"
    helm_sources_path: "/etc/apt/sources.list.d/helm-stable-debian.list"

    cursor_dir: "/opt/cursor"
    cursor_appimage: "/opt/cursor/cursor.AppImage"
    cursor_icon: "/usr/share/pixmaps/cursor.svg"
    cursor_desktop: "/usr/share/applications/cursor.desktop"

    base_packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - wget
      - gnupg
      - gpg
      - git
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - pciutils
      - dmidecode

    kde_packages:
      - kde-full
      - kde-plasma-desktop
      - sddm
      - plasma-nm
      - konsole
      - fonts-powerline
      - firmware-linux
      - firmware-linux-nonfree
      - firmware-iwlwifi
      - firmware-realtek
      - firmware-atheros
      - firmware-brcm80211

    git_packages:
      - git
      - git-lfs
      - git-flow
      - tig
      - gitk

    kvm_packages:
      - qemu-kvm
      - libvirt-daemon-system
      - libvirt-clients
      - virt-manager
      - virtinst
      - virt-viewer
      - bridge-utils
      - ovmf

    flatpak_packages:
      - flatpak
      - plasma-discover-backend-flatpak

    python_tool_packages:
      - pipx
      - ansible
      - ansible-lint

    devops_packages:
      - curl
      - wget
      - jq
      - yq
      - unzip
      - zip
      - tar
      - rsync
      - htop
      - btop
      - ncdu
      - tree
      - tmux
      - screen
      - net-tools
      - nmap
      - traceroute
      - dnsutils
      - whois
      - openssh-client
      - openssh-server
      - build-essential
      - cmake
      - pkg-config
      - docker.io
      - docker-compose

    shell_packages:
      - zsh
      - fonts-powerline

    amd_gpu_packages:
      - firmware-amd-graphics
      - libgl1-mesa-dri
      - xserver-xorg-video-amdgpu

    intel_gpu_packages:
      - intel-media-va-driver
      - libgl1-mesa-dri

    nvidia_gpu_packages:
      - nvidia-driver
      - nvidia-settings

    virtualbox_guest_packages:
      - virtualbox-guest-utils
      - virtualbox-guest-x11

    kvm_guest_packages:
      - spice-vdagent
      - qemu-guest-agent
      - xserver-xorg-video-qxl

    npm_global_packages:
      - pnpm
      - yarn
      - typescript
      - ts-node
      - nodemon
      - http-server

    pipx_packages:
      - ansible-lint
      - pre-commit
      - cookiecutter

  pre_tasks:
    - name: Load passwd database
      ansible.builtin.getent:
        database: passwd

    - name: Assert Debian 13 trixie target
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
          - ansible_distribution_major_version == "13"
          - ansible_distribution_release == "trixie"
          - ansible_architecture == "x86_64"
        fail_msg: "This playbook supports Debian 13 trixie amd64 only."
        success_msg: "Debian 13 trixie amd64 verified."

    # Reason: A fresh Debian netinst may use Deb822 sources by default. This playbook
    # normalizes apt to one clear /etc/apt/sources.list file with contrib,
    # non-free, and non-free-firmware enabled for firmware and GPU drivers.
    - name: Configure Debian 13 trixie apt sources.list
      ansible.builtin.copy:
        dest: "{{ debian_sources_list }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          deb http://deb.debian.org/debian trixie main contrib non-free non-free-firmware
          deb http://deb.debian.org/debian trixie-updates main contrib non-free non-free-firmware
          deb http://security.debian.org/debian-security trixie-security main contrib non-free non-free-firmware

    # Reason: Avoid duplicate Debian repository definitions when Debian was installed
    # with /etc/apt/sources.list.d/debian.sources instead of classic sources.list.
    - name: Check whether Debian Deb822 source file exists
      ansible.builtin.stat:
        path: "{{ debian_deb822_sources }}"
      register: debian_deb822_sources_stat

    - name: Disable default Debian Deb822 source file if present
      ansible.builtin.command:
        cmd: "mv {{ debian_deb822_sources }} {{ debian_deb822_sources }}.disabled-by-devplatform"
        creates: "{{ debian_deb822_sources }}.disabled-by-devplatform"
        removes: "{{ debian_deb822_sources }}"
      when: debian_deb822_sources_stat.stat.exists

    - name: Update apt cache after Debian source configuration
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

  tasks:
    - name: Install base bootstrap packages
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

    # Reason: Hardware detection commands are intentionally read-only and marked
    # unchanged so repeat runs stay clean and understandable.
    - name: Detect GPU vendor
      ansible.builtin.shell: "set -o pipefail && lspci | grep -i vga || true"
      args:
        executable: /bin/bash
      register: gpu_detection
      changed_when: false
      failed_when: false

    - name: Detect system product name
      ansible.builtin.command:
        cmd: "dmidecode -s system-product-name"
      register: system_product_name
      changed_when: false
      failed_when: false

    - name: Set hardware detection facts
      ansible.builtin.set_fact:
        is_virtualbox: "{{ 'virtualbox' in (system_product_name.stdout | lower) }}"
        is_kvm_qemu: "{{ ('kvm' in (system_product_name.stdout | lower)) or ('qemu' in (system_product_name.stdout | lower)) }}"
        has_nvidia_gpu: "{{ 'nvidia' in (gpu_detection.stdout | lower) }}"
        has_amd_gpu: "{{ ('amd' in (gpu_detection.stdout | lower)) or ('advanced micro devices' in (gpu_detection.stdout | lower)) }}"
        has_intel_gpu: "{{ 'intel' in (gpu_detection.stdout | lower) }}"

    - name: Show detected hardware summary
      ansible.builtin.debug:
        msg:
          - "System product: {{ system_product_name.stdout | default('unknown') }}"
          - "GPU line: {{ gpu_detection.stdout | default('none detected') }}"
          - "VirtualBox: {{ is_virtualbox }}"
          - "KVM/QEMU: {{ is_kvm_qemu }}"
          - "NVIDIA GPU: {{ has_nvidia_gpu }}"
          - "AMD GPU: {{ has_amd_gpu }}"
          - "Intel GPU: {{ has_intel_gpu }}"

    # Reason: VirtualBox guest drivers are installed instead of physical GPU
    # drivers because VM display handling is different from bare-metal graphics.
    - name: Install VirtualBox guest display utilities
      ansible.builtin.apt:
        name: "{{ virtualbox_guest_packages }}"
        state: present
      when: is_virtualbox

    # Reason: QEMU/KVM guests benefit from SPICE/QXL integration and guest agents;
    # physical GPU drivers are skipped in this case.
    - name: Install KVM/QEMU guest utilities
      ansible.builtin.apt:
        name: "{{ kvm_guest_packages }}"
        state: present
      when: is_kvm_qemu

    # Reason: NVIDIA drivers require Debian non-free components, enabled earlier.
    # Nouveau blacklisting is only applied after this package task succeeds.
    - name: Install NVIDIA GPU drivers on bare metal
      ansible.builtin.apt:
        name: "{{ nvidia_gpu_packages }}"
        state: present
      register: nvidia_driver_install
      when:
        - not is_virtualbox
        - not is_kvm_qemu
        - has_nvidia_gpu

    # Reason: Nouveau can conflict with the proprietary NVIDIA driver. This is
    # only written after nvidia-driver has installed successfully.
    - name: Blacklist nouveau after NVIDIA driver install
      ansible.builtin.copy:
        dest: /etc/modprobe.d/blacklist-nouveau.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          blacklist nouveau
          options nouveau modeset=0
      when:
        - nvidia_driver_install is defined
        - nvidia_driver_install is succeeded
        - not is_virtualbox
        - not is_kvm_qemu
        - has_nvidia_gpu

    - name: Install AMD GPU drivers on bare metal
      ansible.builtin.apt:
        name: "{{ amd_gpu_packages }}"
        state: present
      when:
        - not is_virtualbox
        - not is_kvm_qemu
        - not has_nvidia_gpu
        - has_amd_gpu

    - name: Install Intel GPU drivers on bare metal
      ansible.builtin.apt:
        name: "{{ intel_gpu_packages }}"
        state: present
      when:
        - not is_virtualbox
        - not is_kvm_qemu
        - not has_nvidia_gpu
        - not has_amd_gpu
        - has_intel_gpu

    - name: Install KDE Plasma desktop, SDDM, networking, and firmware
      ansible.builtin.apt:
        name: "{{ kde_packages }}"
        state: present

    # Reason: Debian display-manager selection can be debconf-driven. Writing the
    # default-display-manager file and enabling sddm makes the result explicit.
    - name: Set SDDM as default display manager
      ansible.builtin.copy:
        dest: /etc/X11/default-display-manager
        owner: root
        group: root
        mode: "0644"
        content: "/usr/bin/sddm\n"

    - name: Enable SDDM service
      ansible.builtin.systemd_service:
        name: sddm
        enabled: yes

    # Reason: GitHub CLI is installed from GitHub's official apt repo instead of
    # the Debian community package, so students get the maintained upstream CLI.
    - name: Install GitHub CLI official keyring
      ansible.builtin.get_url:
        url: "https://cli.github.com/packages/githubcli-archive-keyring.gpg"
        dest: "{{ githubcli_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add GitHub CLI official apt repository
      ansible.builtin.copy:
        dest: "{{ githubcli_sources_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [arch=amd64 signed-by={{ githubcli_keyring_path }}] https://cli.github.com/packages stable main

    - name: Update apt cache after GitHub CLI repository
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Install Git tooling
      ansible.builtin.apt:
        name: "{{ git_packages + ['gh'] }}"
        state: present

    # Reason: ini_file edits ~/.gitconfig idempotently instead of repeatedly
    # running git config commands that always report changes.
    - name: Configure git core.autocrlf
      ansible.builtin.ini_file:
        path: "{{ target_home }}/.gitconfig"
        section: core
        option: autocrlf
        value: input
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"

    - name: Configure git init.defaultBranch
      ansible.builtin.ini_file:
        path: "{{ target_home }}/.gitconfig"
        section: init
        option: defaultBranch
        value: main
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"

    - name: Configure git pull.rebase
      ansible.builtin.ini_file:
        path: "{{ target_home }}/.gitconfig"
        section: pull
        option: rebase
        value: "false"
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"

    - name: Install KVM virtualization stack
      ansible.builtin.apt:
        name: "{{ kvm_packages }}"
        state: present

    - name: Add current user to libvirt and kvm groups
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups:
          - libvirt
          - kvm
        append: yes

    - name: Enable libvirtd service
      ansible.builtin.systemd_service:
        name: libvirtd
        enabled: yes
        state: started

    - name: Install Flatpak and KDE Discover integration
      ansible.builtin.apt:
        name: "{{ flatpak_packages }}"
        state: present

    # Reason: The flatpak command has a built-in --if-not-exists guard, which
    # makes adding Flathub safe across repeat playbook runs.
    - name: Add Flathub remote
      ansible.builtin.command:
        cmd: "flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
      changed_when: false

    # Reason: Brave publishes an official keyring and .sources file. Using their
    # files avoids deprecated apt-key usage and keeps vendor updates working.
    - name: Install Brave official keyring
      ansible.builtin.get_url:
        url: "https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg"
        dest: "{{ brave_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Install Brave official sources file
      ansible.builtin.get_url:
        url: "https://brave-browser-apt-release.s3.brave.com/brave-browser.sources"
        dest: "{{ brave_sources_path }}"
        owner: root
        group: root
        mode: "0644"

    # Reason: Microsoft documents a Deb822 .sources file for VS Code. The key is
    # dearmored into /usr/share/keyrings and referenced with Signed-By.
    - name: Download Microsoft signing key
      ansible.builtin.get_url:
        url: "https://packages.microsoft.com/keys/microsoft.asc"
        dest: "/tmp/microsoft.asc"
        owner: root
        group: root
        mode: "0644"

    - name: Install Microsoft signing key
      ansible.builtin.command:
        cmd: "gpg --dearmor --yes -o {{ microsoft_keyring_path }} /tmp/microsoft.asc"
      changed_when: false

    - name: Set Microsoft keyring permissions
      ansible.builtin.file:
        path: "{{ microsoft_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add VS Code official apt repository
      ansible.builtin.copy:
        dest: "{{ vscode_sources_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://packages.microsoft.com/repos/code
          Suites: stable
          Components: main
          Architectures: amd64
          Signed-By: {{ microsoft_keyring_path }}

    # Reason: Kubernetes packages are distributed through pkgs.k8s.io and each
    # minor version has its own repository path.
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Kubernetes signing key
      ansible.builtin.get_url:
        url: "https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/Release.key"
        dest: "/tmp/kubernetes-release.key"
        owner: root
        group: root
        mode: "0644"

    - name: Install Kubernetes signing key
      ansible.builtin.command:
        cmd: "gpg --dearmor --yes -o {{ kubernetes_keyring_path }} /tmp/kubernetes-release.key"
      changed_when: false

    - name: Set Kubernetes keyring permissions
      ansible.builtin.file:
        path: "{{ kubernetes_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: "{{ kubernetes_sources_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by={{ kubernetes_keyring_path }}] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_minor_version }}/deb/ /

    # Reason: Helm's official documentation lists the Debian/Ubuntu apt package
    # repository hosted by Buildkite. It is added with a signed keyring.
    - name: Download Helm signing key
      ansible.builtin.get_url:
        url: "https://packages.buildkite.com/helm-linux/helm-debian/gpgkey"
        dest: "/tmp/helm.gpgkey"
        owner: root
        group: root
        mode: "0644"

    - name: Install Helm signing key
      ansible.builtin.command:
        cmd: "gpg --dearmor --yes -o {{ helm_keyring_path }} /tmp/helm.gpgkey"
      changed_when: false

    - name: Set Helm keyring permissions
      ansible.builtin.file:
        path: "{{ helm_keyring_path }}"
        owner: root
        group: root
        mode: "0644"

    - name: Add Helm apt repository
      ansible.builtin.copy:
        dest: "{{ helm_sources_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by={{ helm_keyring_path }}] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main

    - name: Update apt cache after vendor repositories
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Install Brave, VS Code, kubectl, and Helm
      ansible.builtin.apt:
        name:
          - brave-browser
          - code
          - kubectl
          - helm
        state: present

    # Reason: Debian 13 may provide the AppImage FUSE compatibility library as
    # libfuse2 or libfuse2t64 depending on repository state. Detecting it avoids
    # a fragile hardcoded package failure.
    - name: Check for libfuse2 package
      ansible.builtin.command:
        cmd: "apt-cache show libfuse2"
      register: libfuse2_check
      changed_when: false
      failed_when: false

    - name: Set AppImage FUSE package fact
      ansible.builtin.set_fact:
        appimage_fuse_package: "{{ 'libfuse2' if libfuse2_check.rc == 0 else 'libfuse2t64' }}"

    - name: Install AppImage FUSE compatibility package
      ansible.builtin.apt:
        name: "{{ appimage_fuse_package }}"
        state: present

    # Reason: Cursor is distributed as an AppImage from the vendor download URL.
    # The AppImage is kept in /opt/cursor and exposed through a desktop launcher.
    - name: Create Cursor install directory
      ansible.builtin.file:
        path: "{{ cursor_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Cursor latest AppImage
      ansible.builtin.get_url:
        url: "https://download.cursor.sh/linux/appImage/x64"
        dest: "{{ cursor_appimage }}"
        owner: root
        group: root
        mode: "0755"
        force: false

    - name: Create Cursor command symlink
      ansible.builtin.file:
        src: "{{ cursor_appimage }}"
        dest: /usr/local/bin/cursor
        state: link
        force: yes

    - name: Install Cursor icon
      ansible.builtin.copy:
        dest: "{{ cursor_icon }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
            <rect width="128" height="128" rx="24" fill="#111827"/>
            <path d="M34 20L92 64L34 108V78L62 64L34 50Z" fill="#ffffff"/>
            <path d="M70 48L98 64L70 80V68L82 64L70 60Z" fill="#9ca3af"/>
          </svg>

    - name: Create Cursor desktop launcher
      ansible.builtin.copy:
        dest: "{{ cursor_desktop }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          [Desktop Entry]
          Type=Application
          Name=Cursor
          Comment=Cursor AI code editor
          Exec={{ cursor_appimage }} %U
          Icon={{ cursor_icon }}
          Terminal=false
          Categories=Development;IDE;TextEditor;
          StartupNotify=true

    - name: Install Python and pipx tooling
      ansible.builtin.apt:
        name: "{{ python_tool_packages }}"
        state: present

    # Reason: pipx keeps Python CLI tools isolated from system Python, avoiding
    # externally-managed-environment conflicts on modern Debian.
    - name: Install Python CLI tools with pipx
      ansible.builtin.command:
        cmd: "pipx install {{ item }}"
        creates: "{{ target_home }}/.local/share/pipx/venvs/{{ item }}"
      become_user: "{{ target_user }}"
      loop: "{{ pipx_packages }}"

    - name: Ensure pipx path is available for current user
      ansible.builtin.command:
        cmd: "pipx ensurepath"
      become_user: "{{ target_user }}"
      changed_when: false

    # Reason: uv's official installer places the user-level binary in ~/.local/bin,
    # avoiding global pip installs and Debian Python policy conflicts.
    - name: Install uv for current user
      ansible.builtin.shell: "curl -LsSf https://astral.sh/uv/install.sh | sh"
      args:
        executable: /bin/bash
        creates: "{{ target_home }}/.local/bin/uv"
      become_user: "{{ target_user }}"

    - name: Install core DevOps utilities
      ansible.builtin.apt:
        name: "{{ devops_packages }}"
        state: present

    - name: Add current user to docker group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups:
          - docker
        append: yes

    - name: Enable Docker service
      ansible.builtin.systemd_service:
        name: docker
        enabled: yes
        state: started

    - name: Enable SSH service
      ansible.builtin.systemd_service:
        name: ssh
        enabled: yes
        state: started

    - name: Install shell and terminal packages
      ansible.builtin.apt:
        name: "{{ shell_packages }}"
        state: present

    - name: Set zsh as default shell for current user
      ansible.builtin.user:
        name: "{{ target_user }}"
        shell: /usr/bin/zsh

    # Reason: Cloning Oh My Zsh directly is idempotent and avoids an interactive
    # installer while still installing the standard framework.
    - name: Install Oh My Zsh for current user
      ansible.builtin.git:
        repo: "https://github.com/ohmyzsh/ohmyzsh.git"
        dest: "{{ target_home }}/.oh-my-zsh"
        version: master
        update: yes
      become_user: "{{ target_user }}"

    - name: Install zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: "https://github.com/zsh-users/zsh-autosuggestions.git"
        dest: "{{ target_home }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        version: master
        update: yes
      become_user: "{{ target_user }}"

    - name: Install zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: "https://github.com/zsh-users/zsh-syntax-highlighting.git"
        dest: "{{ target_home }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        version: master
        update: yes
      become_user: "{{ target_user }}"

    - name: Check whether .zshrc exists
      ansible.builtin.stat:
        path: "{{ target_home }}/.zshrc"
      register: zshrc_stat

    - name: Create .zshrc from Oh My Zsh template
      ansible.builtin.copy:
        src: "{{ target_home }}/.oh-my-zsh/templates/zshrc.zsh-template"
        dest: "{{ target_home }}/.zshrc"
        remote_src: true
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"
      when: not zshrc_stat.stat.exists

    - name: Set Oh My Zsh theme to agnoster
      ansible.builtin.lineinfile:
        path: "{{ target_home }}/.zshrc"
        regexp: '^ZSH_THEME='
        line: 'ZSH_THEME="agnoster"'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"

    - name: Enable Oh My Zsh plugins
      ansible.builtin.lineinfile:
        path: "{{ target_home }}/.zshrc"
        regexp: '^plugins='
        line: 'plugins=(git zsh-autosuggestions zsh-syntax-highlighting)'
        owner: "{{ target_user }}"
        group: "{{ target_user }}"
        mode: "0644"

    # Reason: nvm is intentionally installed per-user, not system-wide, because
    # nvm manages shell environment and Node versions inside the user's home.
    - name: Install nvm for current user
      ansible.builtin.shell: >
        curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
      args:
        executable: /bin/bash
        creates: "{{ target_home }}/.nvm/nvm.sh"
      become_user: "{{ target_user }}"

    # Reason: nvm/npm operations need the nvm shell function loaded. This command
    # is safe to repeat: nvm reuses installed LTS versions and npm updates globals.
    - name: Install latest LTS Node.js and global npm packages
      ansible.builtin.shell: |
        set -euo pipefail
        export NVM_DIR="{{ target_home }}/.nvm"
        . "$NVM_DIR/nvm.sh"
        nvm install --lts
        nvm alias default 'lts/*'
        nvm use default
        npm install -g {{ npm_global_packages | join(' ') }}
      args:
        executable: /bin/bash
      become_user: "{{ target_user }}"
      changed_when: false

  post_tasks:
    - name: Show post-install manual steps
      ansible.builtin.debug:
        msg:
          - "Installation complete."
          - "Manual step required: reboot the machine."
          - "After reboot, log in again so docker/libvirt/kvm groups and zsh shell changes take effect."
          - "If NVIDIA was installed, reboot is required before the proprietary driver is active."
          - "Open KDE Discover once if you want to refresh GUI app metadata."
